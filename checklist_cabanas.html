<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Checklist Cabañas</title>
<style>
  :root {
    --bg: #0f1a12; --card: #162019; --card2: #1c2820;
    --green: #4caf72; --green-light: #6fcf89; --green-dim: #2d6b45;
    --gold: #c9a96e; --blue: #5b9bd5; --blue-dim: #2a4a6b;
    --text: #e8ede9; --muted: #7a9080; --border: #2a3d2e;
    --done-bg: #1a3020; --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HOME */
  #home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; text-align: center; background: radial-gradient(ellipse at 50% 30%, #1e3d22 0%, #0f1a12 70%); }
  .logo-mark { width: 64px; height: 64px; border: 2px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: pulse-ring 3s ease infinite; }
  .logo-mark svg { width: 30px; height: 30px; fill: var(--green); }
  @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(76,175,114,0.3)}50%{box-shadow:0 0 0 12px rgba(76,175,114,0)} }
  .home-title { font-size: 2rem; font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
  .home-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 40px; }
  .cabin-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 360px; }
  .cabin-btn { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; text-align: left; transition: all 0.2s ease; }
  .cabin-btn:active { transform: scale(0.98); }
  .cabin-photo { width: 100%; height: 140px; object-fit: cover; object-position: center 30%; display: block; }
  .cabin-info-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
  .cabin-emoji { font-size: 1.4rem; }
  .cabin-info { flex: 1; }
  .cabin-name { font-size: 1.15rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .cabin-count { font-size: 0.78rem; color: var(--muted); }
  .cabin-arrow { color: var(--green); font-size: 1.2rem; }

  /* TYPE SELECT */
  #typeselect { display: none; min-height: 100vh; background: radial-gradient(ellipse at 50% 20%, #1e3d22 0%, #0f1a12 70%); }
  .ts-header { padding: 20px 20px 0; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .back-btn { background: none; border: none; color: var(--green); font-size: 1.5rem; cursor: pointer; padding: 4px 8px 4px 0; }
  .ts-body { padding: 0 24px 40px; }
  .ts-photo { width: 100%; height: 180px; object-fit: cover; object-position: center 30%; border-radius: var(--radius); margin-bottom: 20px; }
  .ts-cabin-name { font-size: 1.6rem; font-weight: 300; margin-bottom: 6px; color: var(--text); }
  .ts-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 24px; }
  .ts-question { font-size: 1rem; color: var(--text); margin-bottom: 16px; }
  .type-btn { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 16px; margin-bottom: 12px; transition: all 0.2s; }
  .type-btn:active { transform: scale(0.98); }
  .type-btn.regular { border-color: var(--green-dim); }
  .type-btn.profunda { border-color: var(--blue-dim); }
  .type-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
  .type-icon.regular { background: var(--green-dim); }
  .type-icon.profunda { background: var(--blue-dim); }
  .type-info { flex: 1; }
  .type-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 3px; color: var(--text); }
  .type-desc { font-size: 0.78rem; color: var(--muted); }
  .type-arrow { color: var(--muted); font-size: 1.2rem; }

  /* CHECKLIST */
  #checklist { display: none; min-height: 100vh; }
  .cl-header { position: sticky; top: 0; z-index: 10; background: rgba(15,26,18,0.95); backdrop-filter: blur(10px); padding: 16px 20px 14px; border-bottom: 1px solid var(--border); }
  .cl-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .cl-cabin-name { font-size: 1rem; font-weight: 600; flex: 1; }
  .cl-type-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .cl-type-badge.regular { background: var(--green); color: #0a1a0c; font-weight: 700; }
  .cl-type-badge.profunda { background: var(--blue); color: #fff; font-weight: 700; }
  .cl-counter { font-size: 0.78rem; color: var(--muted); background: var(--card2); padding: 4px 10px; border-radius: 20px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); border-radius: 2px; transition: width 0.4s ease; }
  .progress-fill.profunda { background: linear-gradient(90deg, var(--blue-dim), var(--blue)); }
  .cl-body { padding: 24px 20px 120px; }
  .area-header { display: flex; align-items: center; gap: 10px; margin: 24px 0 12px; }
  .area-header:first-child { margin-top: 0; }
  .area-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }
  .area-dot.profunda { background: var(--blue); }
  .area-name { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
  .area-name.profunda { color: #90c4f0; }
  .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden; }
  .task-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green); transform: scaleY(0); transition: transform 0.25s ease; border-radius: 0 2px 2px 0; }
  .task-card.profunda-card::after { background: var(--blue); }
  .task-card.done { background: var(--done-bg); border-color: var(--green-dim); }
  .task-card.profunda-card.done { border-color: var(--blue-dim); }
  .task-card.done::after { transform: scaleY(1); }
  .task-card:active { transform: scale(0.99); }
  .check-circle { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.25s ease; }
  .task-card.done .check-circle { background: var(--green); border-color: var(--green); }
  .task-card.profunda-card.done .check-circle { background: var(--blue); border-color: var(--blue); }
  .check-circle svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0; transform: scale(0.5); transition: all 0.2s ease; }
  .task-card.done .check-circle svg { opacity: 1; transform: scale(1); }
  .task-text { font-size: 0.88rem; line-height: 1.4; flex: 1; transition: color 0.25s; }
  .task-card.done .task-text { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--green-dim); }
  .float-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px 28px; background: linear-gradient(to top, var(--bg) 70%, transparent); pointer-events: none; }
  .float-bar button { pointer-events: all; }

  /* SUMMARY */
  #summary { display: none; min-height: 100vh; background: radial-gradient(ellipse at 50% 0%, #1e3d22 0%, #0f1a12 60%); }
  .sum-header { padding: 20px 20px 0; display: flex; align-items: center; gap: 12px; }
  .sum-body { padding: 24px 20px 120px; }
  .sum-hero { text-align: center; padding: 32px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .sum-icon { width: 72px; height: 72px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 2rem; box-shadow: 0 0 40px rgba(76,175,114,0.3); animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .sum-title { font-size: 1.5rem; font-weight: 300; margin-bottom: 6px; }
  .sum-meta { font-size: 0.78rem; color: var(--muted); }
  .sum-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-num { font-size: 2rem; font-weight: 600; color: var(--green); display: block; }
  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .sum-section { margin-bottom: 16px; }
  .sum-area-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .sum-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .sum-item:last-child { border-bottom: none; }
  .sum-tick { color: var(--green); } .sum-pend { color: #e57373; }
  #msg-box { background: var(--card2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; font-size: 0.8rem; line-height: 1.6; color: var(--muted); white-space: pre-wrap; margin-bottom: 16px; }
  .incomplete-warning { background: rgba(229,115,115,0.1); border: 1px solid rgba(229,115,115,0.3); border-radius: 12px; padding: 12px 16px; font-size: 0.82rem; color: #ef9a9a; margin-bottom: 16px; display: none; }

  /* BUTTONS */
  .btn-primary { width: 100%; background: var(--green); border: none; border-radius: 14px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 0.95rem; font-weight: 600; color: #0f1a12; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 14px; padding: 14px; font-family: -apple-system, sans-serif; font-size: 0.9rem; color: var(--muted); cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #0f1a12; font-size: 0.82rem; font-weight: 600; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

        "Limpiar canaletas","Probar luces interiores y exteriores","Sacudir sillas azules"
      ]}
    ],
    profunda: [
      { area: "Limpieza Profunda — El Horizonte", tasks: [
        "Limpiar vidrios de ventanas de recámara","Limpiar vidrios de ventanas de baño",
        "Lavar todo el piso con cloro (afuera y adentro)","Lavar todos los azulejos del baño"
      ]}
    ]
  }
];

// State
let currentCabin = 0;
let currentType = 'regular';
let checked = {};

function totalTasks(cabinIdx, type) {
  return CABINS[cabinIdx][type].reduce((s, a) => s + a.tasks.length, 0);
}

// Init counts
document.getElementById('count0').textContent = totalTasks(0,'regular') + ' tareas regulares';
document.getElementById('count1').textContent = totalTasks(1,'regular') + ' tareas regulares';

function selectCabin(idx) {
  currentCabin = idx;
  const cabin = CABINS[idx];
  document.getElementById('ts-cabin-name').textContent = cabin.name;
  document.getElementById('ts-photo').src = document.getElementById('photo'+idx).src;
  show('typeselect');
}

function startChecklist(type) {
  currentType = type;
  checked = {};
  renderChecklist();
  show('checklist');
}

function renderChecklist() {
  const cabin = CABINS[currentCabin];
  const isProfunda = currentType === 'profunda';
  document.getElementById('cl-title').textContent = cabin.name;
  const badge = document.getElementById('cl-badge');
  badge.textContent = isProfunda ? 'Limpieza Profunda' : 'Regular';
  badge.className = 'cl-type-badge ' + (isProfunda ? 'profunda' : 'regular');
  document.getElementById('progress-fill').className = 'progress-fill' + (isProfunda ? ' profunda' : '');

  const areas = cabin[currentType];
  const body = document.getElementById('cl-body');
  body.innerHTML = '';

  areas.forEach((section, si) => {
    const ah = document.createElement('div');
    ah.className = 'area-header';
    ah.innerHTML = `<div class="area-dot${isProfunda?' profunda':''}"></div><div class="area-name${isProfunda?' profunda':''}">${section.area}</div>`;
    body.appendChild(ah);
    section.tasks.forEach((task, ti) => {
      const key = `${si}-${ti}`;
      const card = document.createElement('div');
      card.className = 'task-card' + (isProfunda?' profunda-card':'') + (checked[key]?' done':'');
      card.id = 'task-' + key;
      card.onclick = () => toggleTask(key, card);
      card.innerHTML = `<div class="check-circle"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="task-text">${task}</div>`;
      body.appendChild(card);
    });
  });
  updateProgress();
}

function toggleTask(key, card) {
  checked[key] = !checked[key];
  card.classList.toggle('done', checked[key]);
  updateProgress();
}

function updateProgress() {
  const areas = CABINS[currentCabin][currentType];
  let total = 0, done = 0;
  areas.forEach((s, si) => s.tasks.forEach((_, ti) => { total++; if (checked[`${si}-${ti}`]) done++; }));
  document.getElementById('cl-counter').textContent = `${done}/${total}`;
  document.getElementById('progress-fill').style.width = (done/total*100) + '%';
}

function finishChecklist() {
  buildSummary();
  show('summary');
}

function buildSummary() {
  const cabin = CABINS[currentCabin];
  const isProfunda = currentType === 'profunda';
  const areas = cabin[currentType];
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-PA', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const timeStr = now.toLocaleTimeString('es-PA', {hour:'2-digit', minute:'2-digit'});
  const typeLabel = isProfunda ? 'Limpieza Profunda' : 'Checklist Regular';

  let total = 0, done = 0;
  areas.forEach((s, si) => s.tasks.forEach((_, ti) => { total++; if (checked[`${si}-${ti}`]) done++; }));
  const pend = total - done;

  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pend').textContent = pend;
  document.getElementById('sum-meta').textContent = `${cabin.name} · ${typeLabel} · ${dateStr} · ${timeStr}`;

  if (pend === 0) {
    document.getElementById('sum-icon').textContent = '✓';
    document.getElementById('sum-icon').style.background = isProfunda ? 'var(--blue)' : 'var(--green)';
    document.getElementById('sum-title').textContent = '¡Todo listo!';
    document.getElementById('warn-incomplete').style.display = 'none';
  } else {
    document.getElementById('sum-icon').textContent = '⚠';
    document.getElementById('sum-icon').style.background = '#c9a96e';
    document.getElementById('sum-title').textContent = 'Checklist incompleto';
    document.getElementById('warn-incomplete').style.display = 'block';
  }

  const sec = document.getElementById('sum-sections');
  sec.innerHTML = '';
  areas.forEach((s, si) => {
    const div = document.createElement('div');
    div.className = 'sum-section';
    div.innerHTML = `<div class="sum-area-title">${s.area}</div>`;
    s.tasks.forEach((task, ti) => {
      const isDone = checked[`${si}-${ti}`];
      const row = document.createElement('div');
      row.className = 'sum-item';
      row.innerHTML = `<span class="${isDone?'sum-tick':'sum-pend'}">${isDone?'✓':'✗'}</span><span>${task}</span>`;
      div.appendChild(row);
    });
    sec.appendChild(div);
  });

  let msg = `${isProfunda?'🧹':'✅'} ${typeLabel.toUpperCase()} — ${cabin.name.toUpperCase()}\n`;
  msg += `📅 ${dateStr}\n🕐 ${timeStr}\n`;
  msg += `📊 ${done}/${total} tareas completadas\n`;
  if (pend > 0) msg += `⚠️ ${pend} tarea(s) pendiente(s)\n`;
  msg += '\n';
  areas.forEach((s, si) => {
    const areaDone = s.tasks.filter((_, ti) => checked[`${si}-${ti}`]).length;
    const allDone = areaDone === s.tasks.length;
    msg += `${allDone?'✅':'⚠️'} ${s.area} (${areaDone}/${s.tasks.length})\n`;
    if (!allDone) s.tasks.forEach((task, ti) => { if (!checked[`${si}-${ti}`]) msg += `  • Pendiente: ${task}\n`; });
  });
  msg += `\n— Enviado desde Checklist Cabañas`;
  document.getElementById('msg-box').textContent = msg;
}

function copyMsg() {
  const msg = document.getElementById('msg-box').textContent;
  navigator.clipboard.writeText(msg).then(() => showToast('¡Copiado! Pégalo en WhatsApp')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = msg; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('¡Copiado!');
  });
}

function show(screenId) {
  ['home','typeselect','checklist','summary'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = id === screenId ? (id === 'home' ? 'flex' : 'block') : 'none';
  });
  window.scrollTo(0,0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
