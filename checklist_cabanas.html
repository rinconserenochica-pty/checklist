<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Checklist Cabañas</title>

<style>
  :root {
    --bg: #0f1a12;
    --card: #162019;
    --card2: #1c2820;
    --green: #4caf72;
    --green-light: #6fcf89;
    --green-dim: #2d6b45;
    --gold: #c9a96e;
    --text: #e8ede9;
    --muted: #7a9080;
    --border: #2a3d2e;
    --done-bg: #1a3020;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HOME SCREEN ─── */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    text-align: center;
    background: radial-gradient(ellipse at 50% 30%, #1e3d22 0%, #0f1a12 70%);
  }
  .logo-mark {
    width: 64px; height: 64px;
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    animation: pulse-ring 3s ease infinite;
  }
  .logo-mark svg { width: 30px; height: 30px; fill: var(--green); }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 0 0 rgba(76,175,114,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(76,175,114,0); }
  }
  .home-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .home-sub {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .cabin-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 360px;
  }
  .cabin-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .cabin-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(76,175,114,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cabin-btn:active::before { opacity: 1; }
  .cabin-btn:active { transform: scale(0.98); }
  .cabin-icon {
    width: 44px; height: 44px;
    background: var(--green-dim);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.3rem;
  }
  .cabin-info { flex: 1; }
  .cabin-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .cabin-count {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .cabin-arrow { color: var(--green); font-size: 1.2rem; }

  /* ─── CHECKLIST SCREEN ─── */
  #checklist { display: none; min-height: 100vh; }

  .cl-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(15,26,18,0.95);
    backdrop-filter: blur(10px);
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .cl-top {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .back-btn {
    background: none; border: none;
    color: var(--green); font-size: 1.3rem;
    cursor: pointer; padding: 4px 8px 4px 0;
    display: flex; align-items: center;
  }
  .cl-cabin-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 600;
    flex: 1;
  }
  .cl-counter {
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--card2);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .cl-body { padding: 24px 20px 120px; }

  /* area header */
  .area-header {
    display: flex; align-items: center; gap: 10px;
    margin: 24px 0 12px;
  }
  .area-header:first-child { margin-top: 0; }
  .area-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .area-name {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* task card */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .task-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green);
    transform: scaleY(0);
    transition: transform 0.25s ease;
    border-radius: 0 2px 2px 0;
  }
  .task-card.done {
    background: var(--done-bg);
    border-color: var(--green-dim);
  }
  .task-card.done::after { transform: scaleY(1); }
  .task-card:active { transform: scale(0.99); }

  .check-circle {
    width: 26px; height: 26px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
    background: transparent;
  }
  .task-card.done .check-circle {
    background: var(--green);
    border-color: var(--green);
  }
  .check-circle svg {
    width: 14px; height: 14px;
    fill: none; stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s ease;
  }
  .task-card.done .check-circle svg {
    opacity: 1;
    transform: scale(1);
  }
  .task-text {
    font-size: 0.88rem;
    line-height: 1.4;
    flex: 1;
    transition: color 0.25s;
  }
  .task-card.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--green-dim);
  }

  /* ─── SUMMARY SCREEN ─── */
  #summary {
    display: none;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 0%, #1e3d22 0%, #0f1a12 60%);
  }
  .sum-header {
    padding: 20px 20px 0;
    display: flex; align-items: center; gap: 12px;
  }
  .sum-body { padding: 24px 20px 120px; }
  .sum-hero {
    text-align: center;
    padding: 32px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .sum-icon {
    width: 72px; height: 72px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 2rem;
    box-shadow: 0 0 40px rgba(76,175,114,0.3);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .sum-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.5rem;
    font-weight: 300;
    margin-bottom: 6px;
  }
  .sum-meta {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .sum-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--green);
    display: block;
  }
  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .sum-section { margin-bottom: 16px; }
  .sum-area-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .sum-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .sum-item:last-child { border-bottom: none; }
  .sum-tick { color: var(--green); font-size: 0.9rem; }
  .sum-pend { color: #e57373; font-size: 0.9rem; }

  /* message box */
  #msg-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    font-size: 0.8rem;
    line-height: 1.6;
    color: var(--muted);
    white-space: pre-wrap;
    margin-bottom: 16px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  /* buttons */
  .btn-primary {
    width: 100%;
    background: var(--green);
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: #0f1a12;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .btn-primary:active { transform: scale(0.98); background: var(--green-light); }
  .btn-secondary {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .btn-secondary:active { background: var(--card2); }

  /* floating finish btn */
  .float-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px 28px;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    pointer-events: none;
  }
  .float-bar button { pointer-events: all; }

  /* toast */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #0f1a12;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .incomplete-warning {
    background: rgba(229,115,115,0.1);
    border: 1px solid rgba(229,115,115,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: #ef9a9a;
    margin-bottom: 16px;
    display: none;
  }
</style>
</head>

    <button class="btn-secondary" onclick="newCheck()">Nuevo checklist</button>
  </div>
</div>

<div id="toast"></div>

      ]},
      { area: "BBQ", tasks: [
        "Limpiar parrilla","Limpiar área del asador","Limpiar cooler",
        "Lavar utensilios del BBQ","Refil de leña","Refil de carbón",
        "Colocar aceite para asar","Colocar cartón para asar","Limpiar paredes por telarañas"
      ]},
      { area: "General", tasks: [
        "Limpiar área de la fogata","Aromatizar las hamacas","Aromatizar cojín de pérgola",
        "Trapear","Barrer después de trapear","Aromatizar toda la cabaña",
        "Limpiar o lavar alfombras exteriores","Limpiar área alrededor de la cabaña",
        "Limpiar canaletas","Probar luces interiores y exteriores","Probar lámparas de batería"
      ]}
    ]
  }
];

// State
let currentCabin = 0;
let checked = {};

function totalTasks(cabinIdx) {
  return CABINS[cabinIdx].areas.reduce((s, a) => s + a.tasks.length, 0);
}

// Init counts
document.getElementById('count0').textContent = totalTasks(0) + ' tareas';
document.getElementById('count1').textContent = totalTasks(1) + ' tareas';

function startChecklist(cabinIdx) {
  currentCabin = cabinIdx;
  checked = {};
  renderChecklist();
  show('checklist');
}

function renderChecklist() {
  const cabin = CABINS[currentCabin];
  document.getElementById('cl-title').textContent = cabin.name;
  const body = document.getElementById('cl-body');
  body.innerHTML = '';

  cabin.areas.forEach((section, si) => {
    const ah = document.createElement('div');
    ah.className = 'area-header';
    ah.innerHTML = `<div class="area-dot"></div><div class="area-name">${section.area}</div>`;
    body.appendChild(ah);

    section.tasks.forEach((task, ti) => {
      const key = `${si}-${ti}`;
      const card = document.createElement('div');
      card.className = 'task-card' + (checked[key] ? ' done' : '');
      card.id = 'task-' + key;
      card.onclick = () => toggleTask(key, card);
      card.innerHTML = `
        <div class="check-circle">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="task-text">${task}</div>`;
      body.appendChild(card);
    });
  });
  updateProgress();
}

function toggleTask(key, card) {
  checked[key] = !checked[key];
  card.classList.toggle('done', checked[key]);
  updateProgress();
}

function updateProgress() {
  const cabin = CABINS[currentCabin];
  let total = 0, done = 0;
  cabin.areas.forEach((s, si) => {
    s.tasks.forEach((_, ti) => {
      total++;
      if (checked[`${si}-${ti}`]) done++;
    });
  });
  document.getElementById('cl-counter').textContent = `${done}/${total}`;
  document.getElementById('progress-fill').style.width = (done / total * 100) + '%';
}

function finishChecklist() {
  buildSummary();
  show('summary');
}

function buildSummary() {
  const cabin = CABINS[currentCabin];
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-PA', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const timeStr = now.toLocaleTimeString('es-PA', {hour:'2-digit', minute:'2-digit'});

  let total = 0, done = 0;
  cabin.areas.forEach((s, si) => s.tasks.forEach((_, ti) => { total++; if (checked[`${si}-${ti}`]) done++; }));
  const pend = total - done;

  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pend').textContent = pend;
  document.getElementById('sum-meta').textContent = `${cabin.name} · ${dateStr} · ${timeStr}`;

  if (pend === 0) {
    document.getElementById('sum-icon').textContent = '✓';
    document.getElementById('sum-title').textContent = '¡Todo listo!';
    document.getElementById('warn-incomplete').style.display = 'none';
  } else {
    document.getElementById('sum-icon').textContent = '⚠';
    document.getElementById('sum-icon').style.background = '#c9a96e';
    document.getElementById('sum-title').textContent = 'Checklist incompleto';
    document.getElementById('warn-incomplete').style.display = 'block';
  }

  // Sections
  const sec = document.getElementById('sum-sections');
  sec.innerHTML = '';
  cabin.areas.forEach((s, si) => {
    const div = document.createElement('div');
    div.className = 'sum-section';
    div.innerHTML = `<div class="sum-area-title">${s.area}</div>`;
    s.tasks.forEach((task, ti) => {
      const key = `${si}-${ti}`;
      const isDone = checked[key];
      const row = document.createElement('div');
      row.className = 'sum-item';
      row.innerHTML = `<span class="${isDone ? 'sum-tick' : 'sum-pend'}">${isDone ? '✓' : '✗'}</span><span>${task}</span>`;
      div.appendChild(row);
    });
    sec.appendChild(div);
  });

  // Build message
  let msg = `✅ CHECKLIST ${cabin.name.toUpperCase()}\n`;
  msg += `📅 ${dateStr}\n🕐 ${timeStr}\n`;
  msg += `📊 ${done}/${total} tareas completadas\n`;
  if (pend > 0) msg += `⚠️ ${pend} tarea(s) pendiente(s)\n`;
  msg += '\n';

  cabin.areas.forEach((s, si) => {
    const areaDone = s.tasks.filter((_, ti) => checked[`${si}-${ti}`]).length;
    const allDone = areaDone === s.tasks.length;
    msg += `${allDone ? '✅' : '⚠️'} ${s.area} (${areaDone}/${s.tasks.length})\n`;
    if (!allDone) {
      s.tasks.forEach((task, ti) => {
        if (!checked[`${si}-${ti}`]) msg += `  • Pendiente: ${task}\n`;
      });
    }
  });

  msg += `\n— Enviado desde Checklist Cabañas`;
  document.getElementById('msg-box').textContent = msg;
}

function copyMsg() {
  const msg = document.getElementById('msg-box').textContent;
  navigator.clipboard.writeText(msg).then(() => {
    showToast('¡Copiado! Pégalo en WhatsApp');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = msg; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('¡Copiado!');
  });
}

function newCheck() { show('home'); }
function goHome() { show('home'); }
function backToChecklist() { show('checklist'); }

function show(screenId) {
  ['home','checklist','summary'].forEach(id => {
    document.getElementById(id).style.display = id === screenId ? (id === 'home' ? 'flex' : 'block') : 'none';
  });
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
